<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}{{ bakery_name }}{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="site-header">
        <a href="{{ url_for('home') }}" class="brand">
            <img src="{{ url_for('static', filename='images/logo.jpeg') }}" alt="{{ bakery_name }} logo" class="brand-logo">
            <span>{{ bakery_name }}</span>
        </a>
        <button class="nav-toggle" id="nav-toggle" aria-label="Open menu" aria-expanded="false">
            <span></span><span></span><span></span>
        </button>
        <nav class="nav" id="primary-nav">
            <a href="{{ url_for('home') }}">Home</a>
            <a href="{{ url_for('menu') }}">Menu</a>
            <a href="{{ url_for('gallery') }}">Gallery</a>
            <a href="{{ url_for('order') }}" class="nav-cta">Order Now</a>
        </nav>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
        <div class="footer-info">
            <h4>Good to know</h4>
            <ul>
                <li>Please place your order at least <strong>2 days in advance</strong>.</li>
                <li>Delivery available in <strong>Jaipur only</strong>.</li>
            </ul>
        </div>
        <p class="footer-credit">&copy; {{ bakery_name }} &middot; Baked fresh, with love.</p>
    </footer>

    {% block whatsapp_fab %}
    <a href="https://wa.me/{{ baker_whatsapp }}?text=Hi!%20I%27d%20like%20to%20order%20a%20cake."
       target="_blank" rel="noopener"
       class="whatsapp-fab" aria-label="Chat with us on WhatsApp">
        <svg viewBox="0 0 32 32" width="28" height="28" aria-hidden="true">
            <path fill="currentColor" d="M16.001 3C9.373 3 4 8.373 4 15c0 2.39.71 4.62 1.93 6.5L4 29l7.71-1.9A11.95 11.95 0 0 0 16.001 27c6.628 0 12.001-5.373 12.001-12S22.628 3 16.001 3zm0 21.7c-1.85 0-3.59-.49-5.09-1.34l-.36-.21-4.58 1.13 1.15-4.46-.23-.37A9.7 9.7 0 0 1 6.3 15c0-5.36 4.34-9.7 9.7-9.7s9.7 4.34 9.7 9.7-4.34 9.7-9.7 9.7zm5.34-7.27c-.29-.15-1.74-.86-2.01-.96-.27-.1-.47-.15-.66.15s-.76.96-.94 1.15c-.17.2-.34.22-.63.07-.29-.15-1.24-.46-2.36-1.46-.87-.78-1.46-1.73-1.63-2.02-.17-.29-.02-.45.13-.59.13-.13.29-.34.43-.51.14-.17.19-.29.29-.49.1-.2.05-.37-.02-.51-.07-.15-.66-1.59-.9-2.18-.24-.58-.49-.5-.66-.51l-.56-.01c-.2 0-.51.07-.78.37-.27.29-1.03 1.01-1.03 2.45 0 1.44 1.05 2.83 1.2 3.03.15.2 2.07 3.16 5.02 4.43.7.3 1.25.48 1.67.61.7.22 1.34.19 1.84.12.56-.08 1.74-.71 1.98-1.4.24-.69.24-1.27.17-1.4-.07-.13-.27-.2-.56-.34z"/>
        </svg>
        <span class="whatsapp-label">Chat with us</span>
    </a>
    {% endblock %}

    <script>
    (function() {
        const toggle = document.getElementById('nav-toggle');
        const nav = document.getElementById('primary-nav');
        if (toggle && nav) {
            toggle.addEventListener('click', function() {
                const open = nav.classList.toggle('open');
                toggle.setAttribute('aria-expanded', open ? 'true' : 'false');
                toggle.classList.toggle('open', open);
            });
            nav.querySelectorAll('a').forEach(function(a) {
                a.addEventListener('click', function() {
                    nav.classList.remove('open');
                    toggle.classList.remove('open');
                    toggle.setAttribute('aria-expanded', 'false');
                });
            });
        }
    })();
    </script>
</body>
</html>
