<div id="cake-modal" class="modal" aria-hidden="true">
    <div class="modal-backdrop" data-close-modal></div>
    <div class="modal-content" role="dialog" aria-modal="true">
        <button type="button" class="modal-close" data-close-modal aria-label="Close">&times;</button>
        <img id="modal-image" src="" alt="">
        <div class="modal-body">
            <h3 id="modal-title"></h3>
            <p id="modal-description"></p>
            <div class="modal-footer">
                <span class="price" id="modal-price"></span>
                <a id="modal-order" href="#" class="btn btn-primary">Place Order</a>
            </div>
        </div>
    </div>
</div>

<script>
(function() {
    const modal = document.getElementById('cake-modal');
    if (!modal) return;
    const img = document.getElementById('modal-image');
    const title = document.getElementById('modal-title');
    const desc = document.getElementById('modal-description');
    const price = document.getElementById('modal-price');
    const orderBtn = document.getElementById('modal-order');
    const orderBase = "{{ url_for('order') }}";

    function openModal(card) {
        const isCustom = card.dataset.cakeCustom === 'true';
        img.src = card.dataset.cakeImage;
        img.alt = card.dataset.cakeName;
        title.textContent = card.dataset.cakeName;
        desc.textContent = card.dataset.cakeDescription;
        if (isCustom) {
            price.textContent = 'Price on Request';
            price.classList.add('price-custom');
            orderBtn.textContent = 'Inquire on WhatsApp';
            orderBtn.classList.add('btn-wa');
            // Defer to the inquiry popup rather than going straight to WhatsApp,
            // so the customer sees what to mention.
            orderBtn.href = '#';
            orderBtn.dataset.openInquiry = card.dataset.cakeName;
        } else {
            price.textContent = '₹' + card.dataset.cakePrice;
            price.classList.remove('price-custom');
            orderBtn.textContent = 'Place Order';
            orderBtn.classList.remove('btn-wa');
            orderBtn.href = orderBase + '?cake=' + encodeURIComponent(card.dataset.cakeName);
            delete orderBtn.dataset.openInquiry;
        }
        modal.classList.add('open');
        modal.setAttribute('aria-hidden', 'false');
        document.body.style.overflow = 'hidden';
    }
    function closeModal() {
        modal.classList.remove('open');
        modal.setAttribute('aria-hidden', 'true');
        document.body.style.overflow = '';
    }

    document.querySelectorAll('.cake-card .cake-image-wrap.clickable, .cake-card .cake-image.clickable').forEach(function(el) {
        el.addEventListener('click', function() { openModal(el.closest('.cake-card')); });
    });
    modal.querySelectorAll('[data-close-modal]').forEach(function(el) {
        el.addEventListener('click', closeModal);
    });

    // If the order button is in custom-cake mode, hand off to the inquiry popup
    // instead of navigating away.
    orderBtn.addEventListener('click', function(e) {
        const inquireFor = orderBtn.dataset.openInquiry;
        if (!inquireFor) return;
        e.preventDefault();
        closeModal();
        if (typeof window.openInquiryPopup === 'function') {
            window.openInquiryPopup(inquireFor);
        }
    });
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && modal.classList.contains('open')) closeModal();
    });
})();
</script>
