services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bakery-app
    ports:
      - "5000:5000"
    env_file: .env
    volumes:
      - ./app.py:/app/app.py
      - ./templates:/app/templates
      - ./static:/app/static
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/').read()"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    restart: unless-stopped

